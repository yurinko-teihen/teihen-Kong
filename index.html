<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Donkey Kong - GB 1994 Clone</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: #000;
        color: #fff;
        display: flex;
        flex-direction: column;
        height: 100dvh;
      }
      
      header {
        background-color: #000;
        padding: 8px;
        text-align: center;
        border-bottom: 2px solid #ff0000;
        flex-shrink: 0;
      }
      
      header h1 {
        font-size: 18px;
        color: #ff0000;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        touch-action: none;
      }
      
      #canvas {
        display: block;
        background-color: black;
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        touch-action: none;
      }
      
      @media (orientation: portrait) {
        #canvas {
          width: 100vw;
          height: auto;
        }
      }
      
      @media (orientation: landscape) {
        #canvas {
          height: 100%;
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>🍌 Donkey Kong - GB 1994 Clone 🎮</h1>
    </header>
    
    <main>
      <canvas id="canvas"></canvas>
    </main>
    
    <script src="js/script.js"></script>
    <script src="js/platform.js"></script>
    <script src="js/ladder.js"></script>
    <script src="js/mario.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/barrel.js"></script>
    <script src="js/obsctacle.js"></script>
    <script src="js/hammer.js"></script>
    
    <script>
      // Touch gesture controls: tap = jump, horizontal slide = move left/right
      const SLIDE_THRESHOLD = 20; // px to recognize a slide
      const TAP_DURATION = 300;   // ms max for a tap

      const triggerKeyEvent = (keyCode, eventType) => {
        window.dispatchEvent(new KeyboardEvent(eventType, {
          keyCode, which: keyCode, bubbles: true, cancelable: true
        }));
      };

      let touchStartX = 0;
      let touchStartY = 0;
      let touchStartTime = 0;
      let sliding = false;
      let slideDir = null; // 'left' | 'right'

      const releaseSlide = () => {
        if (slideDir === 'left') triggerKeyEvent(37, 'keyup');
        if (slideDir === 'right') triggerKeyEvent(39, 'keyup');
        slideDir = null;
        sliding = false;
      };

      document.getElementById('canvas').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const t = e.changedTouches[0];
        touchStartX = t.clientX;
        touchStartY = t.clientY;
        touchStartTime = Date.now();
        sliding = false;
        slideDir = null;
      }, { passive: false });

      document.getElementById('canvas').addEventListener('touchmove', (e) => {
        e.preventDefault();
        const t = e.changedTouches[0];
        const dx = t.clientX - touchStartX;

        if (Math.abs(dx) >= SLIDE_THRESHOLD) {
          sliding = true;
          const newDir = dx < 0 ? 'left' : 'right';
          if (newDir !== slideDir) {
            // Release previous direction
            if (slideDir === 'left') triggerKeyEvent(37, 'keyup');
            if (slideDir === 'right') triggerKeyEvent(39, 'keyup');
            slideDir = newDir;
            if (slideDir === 'left') triggerKeyEvent(37, 'keydown');
            if (slideDir === 'right') triggerKeyEvent(39, 'keydown');
          }
        }
      }, { passive: false });

      document.getElementById('canvas').addEventListener('touchend', (e) => {
        e.preventDefault();
        const elapsed = Date.now() - touchStartTime;
        const t = e.changedTouches[0];
        const dx = Math.abs(t.clientX - touchStartX);

        if (sliding) {
          releaseSlide();
        } else if (dx < SLIDE_THRESHOLD && elapsed < TAP_DURATION) {
          // Tap: jump or start/retry
          if (!isGamePlaying && !isGameOver) {
            window.handleStartRetry();
          } else if (isGameOver) {
            window.handleStartRetry();
          } else {
            triggerKeyEvent(32, 'keydown');
            setTimeout(() => triggerKeyEvent(32, 'keyup'), 100);
          }
        }
      }, { passive: false });

      document.getElementById('canvas').addEventListener('touchcancel', (e) => {
        releaseSlide();
      }, { passive: false });
    </script>
  </body>
</html>
